<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup & Sign In - Service Recommendation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <!-- Left Panel - Signup -->
            <div class="auth-panel signup-panel">
                <div class="panel-header">
                    <h2>Create Account</h2>
                    <p>Join us to get personalized service recommendations</p>
                </div>
                
                <form class="auth-form" id="signupForm">
                    <div class="form-group">
                        <label for="signup-username">Username</label>
                        <input type="text" id="signup-username" name="username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" name="password" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="signup-confirm">Confirm Password</label>
                        <input type="password" id="signup-confirm" name="confirm" required>
                    </div>
                    
                    <button type="submit" class="auth-btn signup-btn">
                        <span>Sign Up</span>
                        <div class="btn-icon">→</div>
                    </button>
                </form>
                
                <div class="form-footer">
                    <p>Already have an account? <a href="#" id="showSignin">Sign In</a></p>
                </div>
            </div>
            
            <!-- Divider -->
            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">OR</span>
                <div class="divider-line"></div>
            </div>
            
            <!-- Right Panel - Sign In -->
            <div class="auth-panel signin-panel">
                <div class="panel-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to access your account</p>
                </div>
                
                <form class="auth-form" id="signinForm">
                    <div class="form-group">
                        <label for="signin-username">Username</label>
                        <input type="text" id="signin-username" name="username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="signin-password">Password</label>
                        <input type="password" id="signin-password" name="password" required>
                    </div>
                    
                    <button type="submit" class="auth-btn signin-btn">
                        <span>Sign In</span>
                        <div class="btn-icon">→</div>
                    </button>
                </form>
                
                <div class="form-footer">
                    <p>Don't have an account? <a href="#" id="showSignup">Sign Up</a></p>
                </div>
            </div>
        </div>
        
        <!-- Success Message (Hidden by default) -->
        <div class="success-message" id="successMessage">
            <div class="success-content">
                <div class="success-icon">✓</div>
                <h3>Success!</h3>
                <p id="successText">Action completed successfully</p>
            </div>
        </div>
    </div>
    
    <script>
        // Form switching functionality
        document.getElementById('showSignin').addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelector('.signup-panel').style.display = 'none';
            document.querySelector('.signin-panel').style.display = 'block';
            document.querySelector('.divider').style.display = 'flex';
        });
        
        document.getElementById('showSignup').addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelector('.signup-panel').style.display = 'block';
            document.querySelector('.signin-panel').style.display = 'none';
            document.querySelector('.divider').style.display = 'flex';
        });
        
        // Form submission handlers
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            
            if (password !== confirm) {
                showError('Passwords do not match!');
                return;
            }
            
            showSuccess('Account created successfully!');
            this.reset();
        });
        
        document.getElementById('signinForm').addEventListener('submit', function(e) {
            e.preventDefault();
            showSuccess('Signed in successfully!');
            this.reset();
        });
        
        function showError(message) {
            // Create error element
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = `
                <div class="error-content">
                    <div class="error-icon">⚠</div>
                    <p>${message}</p>
                </div>
            `;
            
            document.body.appendChild(errorDiv);
            
            // Remove after 3 seconds
            setTimeout(() => {
                errorDiv.remove();
            }, 3000);
        }
        
        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            const successText = document.getElementById('successText');
            
            successText.textContent = message;
            successEl.style.display = 'flex';
            
            // Hide after 3 seconds
            setTimeout(() => {
                successEl.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
